services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

  ollama-model:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    command:
      - until ollama list; do sleep 2; done; ollama pull "$${OLLAMA_EMBEDDING_MODEL}"
    depends_on:
      - ollama

  bot:
    build: .
    command: sh -c "npm run deploy && npm start"
    env_file:
      - .env
    environment:
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_ADMIN_USER_IDS: ${DISCORD_ADMIN_USER_IDS:-}
      DISCORD_MODERATOR_ROLE_IDS: ${DISCORD_MODERATOR_ROLE_IDS:-}
      RUNTIME_QDRANT_URL: http://qdrant:6333
      RUNTIME_EMBEDDING_PROVIDER: ollama
      RUNTIME_OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./.cache:/app/.cache
    depends_on:
      qdrant:
        condition: service_started
      ollama-model:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  qdrant_storage:
  ollama_storage:
